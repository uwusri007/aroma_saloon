services:
  mailhog:
    image: mailhog/mailhog:latest
    container_name: salon-mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1026}:1025"
      - "${MAILHOG_UI_PORT:-8026}:8025"

  mysql:
    image: mysql:8.0
    container_name: salon-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-salon_root_pass}
      MYSQL_DATABASE: ${DB_NAME:-salon_booking}
    ports:
      - "${DB_HOST_PORT:-3307}:3306"
    volumes:
      - salon_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  salon_mysql_data:
