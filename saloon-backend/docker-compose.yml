services:
  mysql:
    image: mysql:8.0
    container_name: salon-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-salon_root_pass}
      MYSQL_DATABASE: ${DB_NAME:-salon_booking}
    ports:
      - "${DB_HOST_PORT:-3307}:3306"
    volumes:
      - salon_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: salon-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${PORT:-5000}:5000"
    environment:
      PORT: 5000
      NODE_ENV: ${NODE_ENV:-production}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-salon_root_pass}
      DB_NAME: ${DB_NAME:-salon_booking}
      JWT_SECRET: ${JWT_SECRET:-change_this_jwt_secret_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID:-}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET:-}
      PAYPAL_MODE: ${PAYPAL_MODE:-sandbox}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-Salon Booking <noreply@salon.com>}
      UPLOAD_DIR: uploads
    volumes:
      - salon_uploads:/app/uploads

volumes:
  salon_mysql_data:
  salon_uploads:
